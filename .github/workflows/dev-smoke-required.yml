name: dev-smoke-required

on:
  pull_request:
  workflow_dispatch:

jobs:
  dev-smoke-required:
    name: dev-smoke-required
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DEV_SMOKE_MAX_RETRIES: "1"
      DEV_SMOKE_RETRY_DELAY_SECONDS: "5"
      DEV_SMOKE_TEST_SEED: "dev-smoke-required-v1"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run required dev smoke gate (PR profile + retry policy)
        run: |
          python3 ./scripts/run_dev_smoke_required_with_retry.py \
            --output-json artifacts/pr-dev-smoke-required.json \
            --report-json artifacts/pr-dev-smoke-required-retry-report.json \
            --summary-markdown artifacts/pr-dev-smoke-required-summary.md

      - name: Run deterministic flaky demo marker
        if: always()
        run: |
          rm -f artifacts/dev-smoke-flaky-demo-state.txt
          python3 ./scripts/run_dev_smoke_required_with_retry.py \
            --runner-script scripts/smoke/dev_smoke_flaky_demo_runner.py \
            --output-json artifacts/dev-smoke-flaky-demo.json \
            --report-json artifacts/dev-smoke-flaky-demo-retry-report.json \
            --summary-markdown artifacts/dev-smoke-flaky-demo-summary.md \
            --max-retries 1 \
            --retry-delay-seconds 0

      - name: Append retry/flaky summary
        if: always()
        run: |
          if [ -f artifacts/pr-dev-smoke-required-summary.md ]; then
            cat artifacts/pr-dev-smoke-required-summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## dev-smoke-required Retry Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "- summary artifact missing" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -f artifacts/dev-smoke-flaky-demo-summary.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat artifacts/dev-smoke-flaky-demo-summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "## dev-smoke-flaky demo summary" >> "$GITHUB_STEP_SUMMARY"
            echo "- summary artifact missing" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Log failure artifact paths
        if: failure()
        run: |
          echo "dev-smoke failure summary artifact: artifacts/pr-dev-smoke-required-summary.md"
          echo "dev-smoke retry report artifact: artifacts/pr-dev-smoke-required-retry-report.json"
          echo "dev-smoke report artifact: artifacts/pr-dev-smoke-required.json"

      - name: Upload dev-smoke failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dev-smoke-required-failure-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          path: |
            artifacts/pr-dev-smoke-required-summary.md
            artifacts/pr-dev-smoke-required-retry-report.json
            artifacts/pr-dev-smoke-required.json
